spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/jirapipe
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:29092

jirapipe:
  ollama:
    base-url: http://ollama:11434

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://jaeger:4317
