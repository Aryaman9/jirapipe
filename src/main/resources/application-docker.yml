spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/jirapipe
  data:
    redis:
      host: redis
  kafka:
    bootstrap-servers: kafka:29092

jirapipe:
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
  openai:
    base-url: ${OPENAI_BASE_URL:https://openrouter.ai/api/v1}

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces
