spring:
  application:
    name: jirapipe
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: jirapipe-triage
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.jirapipe.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jirapipe}
    username: ${DB_USER:jirapipe}
    password: ${DB_PASSWORD:jirapipe}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jirapipe:
  mock-mode: false
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model: mistral:7b
    timeout: 30s
  openai:
    api-key: ${OPENAI_API_KEY:}
    embedding-model: text-embedding-3-small
    completion-model: gpt-4o
    timeout: 60s
    max-tokens: 2048
  jira:
    base-url: ${JIRA_BASE_URL:}
    email: ${JIRA_EMAIL:}
    api-token: ${JIRA_API_TOKEN:}
    webhook-secret: ${JIRA_WEBHOOK_SECRET:}
  pipeline:
    vector-similarity-threshold: 0.85
    auto-resolve-threshold: 0.95
    max-similar-results: 5
  retry:
    max-attempts: 3
    initial-delay-ms: 1000
    multiplier: 2.0
    max-delay-ms: 30000
  cache:
    embedding-ttl-hours: 24
  kafka:
    topics:
      ticket-ingestion: jirapipe.tickets.ingestion
      dead-letter: jirapipe.tickets.dlq

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    instances:
      ollama:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      openai:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 2
      jira:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId}] %-5level %logger{36} - %msg%n"
  level:
    com.jirapipe: DEBUG
    org.springframework.kafka: INFO
